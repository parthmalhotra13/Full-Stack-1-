<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #ffffff;
    --accent: #3b82f6;
  }

  body.light {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #000000;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }

  .container {
    display: grid;
    grid-template-columns: 250px 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    gap: 20px;
    padding: 20px;
  }

  header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sidebar {
    background: var(--card);
    border-radius: 10px;
    padding: 20px;
    font-size: 20px;
  }

  .main {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .card {
    background: var(--card);
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    font-size: 20px;
    transition: 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: var(--accent);
    color: white;
    font-size: 14px;
  }

</style>
</head>

<body>

<div class="container">

  <header>
    <h1>Admin Dashboard</h1>
    <button onclick="toggleTheme()">🌙 Toggle Mode</button>
  </header>

  <div class="sidebar">
    Navigation
  </div>

  <div class="main">
    <div class="card">Analytics</div>
    <div class="card">Users</div>
    <div class="card">Settings</div>
  </div>

</div>

<script>
  // Load saved theme
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }

  function toggleTheme() {
    document.body.classList.toggle("light");

    // Save preference
    if (document.body.classList.contains("light")) {
      localStorage.setItem("theme", "light");
    } else {
      localStorage.setItem("theme", "dark");
    }
  }
</script>

</body>
</html>
