<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Banking Interface</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: #eaeaea;
    padding: 40px;
    border-radius: 10px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  h1 {
    margin-bottom: 20px;
  }

  input {
    width: 80%;
    padding: 12px;
    font-size: 16px;
    margin: 15px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  .buttons {
    display: flex;
    justify-content: space-between;
  }

  button {
    width: 45%;
    padding: 12px;
    border: none;
    color: white;
    font-size: 18px;
    border-radius: 6px;
    cursor: pointer;
  }

  .deposit {
    background: linear-gradient(to right, #2b6cff, #4a8cff);
  }

  .withdraw {
    background: linear-gradient(to right, #ff2b2b, #ff5a5a);
  }

  .error {
    color: red;
    margin-top: 15px;
    font-size: 18px;
  }
</style>

</head>
<body>

<div class="container">
  <h1>Balance: $<span id="balance">1000</span></h1>

  <h3>Amount</h3>
  <input type="number" id="amount" placeholder="Enter amount">

  <div class="buttons">
    <button class="deposit" onclick="deposit()">Deposit</button>
    <button class="withdraw" onclick="withdraw()">Withdraw</button>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  let balance = 1000;

  function deposit() {
    let amt = parseFloat(document.getElementById("amount").value);
    let error = document.getElementById("error");

    if (isNaN(amt) || amt <= 0) {
      error.innerText = "Invalid amount!";
      return;
    }

    balance += amt;
    document.getElementById("balance").innerText = balance;
    error.innerText = "";
  }

  function withdraw() {
    let amt = parseFloat(document.getElementById("amount").value);
    let error = document.getElementById("error");

    if (isNaN(amt) || amt <= 0 || amt > balance) {
      error.innerText = "Invalid amount!";
      return;
    }

    balance -= amt;
    document.getElementById("balance").innerText = balance;
    error.innerText = "";
  }
</script>

</body>
</html>
